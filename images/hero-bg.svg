<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C42;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- Musical Notes -->
  <g opacity="0.6">
    <!-- Treble clef silhouette -->
    <path d="M200,400 Q250,350 300,400 Q350,450 300,500 Q250,550 200,500 Q150,450 200,400" fill="#FFF8F0" opacity="0.8"/>
    <path d="M400,300 Q450,250 500,300 Q550,350 500,400 Q450,450 400,400 Q350,350 400,300" fill="#4169E1" opacity="0.6"/>
    <path d="M600,500 Q650,450 700,500 Q750,550 700,600 Q650,650 600,600 Q550,550 600,500" fill="#32CD32" opacity="0.7"/>
  </g>

  <!-- Guitar Silhouettes -->
  <g opacity="0.4">
    <!-- Guitar 1 -->
    <ellipse cx="1200" cy="600" rx="80" ry="200" fill="#2D1810" transform="rotate(-15 1200 600)"/>
    <rect x="1180" y="500" width="40" height="200" fill="#8B4513" transform="rotate(-15 1200 600)"/>
    <ellipse cx="1200" cy="400" rx="30" ry="50" fill="#DC143C" transform="rotate(-15 1200 600)"/>

    <!-- Guitar 2 -->
    <ellipse cx="800" cy="300" rx="60" ry="150" fill="#2D1810" transform="rotate(25 800 300)"/>
    <rect x="785" y="225" width="30" height="150" fill="#FFD700" transform="rotate(25 800 300)"/>
    <ellipse cx="800" cy="175" rx="25" ry="40" fill="#FF6B35" transform="rotate(25 800 300)"/>
  </g>

  <!-- Colorful Shapes -->
  <circle cx="300" cy="200" r="100" fill="#FF8C42" opacity="0.3"/>
  <circle cx="1600" cy="800" r="150" fill="#4169E1" opacity="0.2"/>
  <polygon points="100,800 200,700 150,900" fill="#32CD32" opacity="0.4"/>
  <polygon points="1700,200 1800,100 1750,300" fill="#DC143C" opacity="0.5"/>

  <!-- Glow overlay -->
  <rect width="1920" height="1080" fill="url(#glow)"/>
</svg>
